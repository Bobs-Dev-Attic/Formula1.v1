<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a12" />
    <meta name="description" content="A configurable 3rd-person 3D Formula 1 racing game built with Three.js" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0a12'/%3E%3Ctext x='16' y='23' font-size='20' font-family='Arial' font-weight='bold' text-anchor='middle' fill='%23e10600'%3EF1%3C/text%3E%3C/svg%3E"
    />
    <title>Formula 1 · V1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>

      <!-- Orientation guard for portrait mobile -->
      <div id="rotate-guard">
        <div class="rotate-icon">⟲</div>
        <p>Rotate your device to landscape to race.</p>
      </div>

      <!-- Loading -->
      <div id="loader">
        <div class="loader-bar"><span></span></div>
        <div class="loader-text">Warming up the grid…</div>
      </div>

      <!-- Start / setup menu -->
      <div id="menu" class="hidden">
        <div class="menu-card">
          <h1>FORMULA <span>1</span> <em>· V1</em></h1>
          <p class="tag">Configurable 3D F1 · Three.js</p>

          <div class="menu-row">
            <label for="sel-track">Circuit</label>
            <select id="sel-track"></select>
          </div>
          <div class="menu-row">
            <label for="sel-team">Livery</label>
            <select id="sel-team"></select>
          </div>
          <div class="menu-row">
            <label for="sel-assist">Driving assists</label>
            <select id="sel-assist">
              <option value="arcade">Arcade (grippy)</option>
              <option value="balanced" selected>Balanced</option>
              <option value="sim">Simulation (loose)</option>
            </select>
          </div>

          <button id="btn-start">ENTER COCKPIT</button>
          <button id="btn-garage" class="ghost">Garage &amp; Setup</button>
          <p class="hint" id="control-hint"></p>
        </div>
      </div>

      <!-- Garage / setup panel -->
      <div id="garage" class="hidden"></div>

      <!-- In-race HUD (built by hud.js) -->
      <div id="hud" class="hidden"></div>

      <!-- Mobile touch controls (built by controls.js when touch detected) -->
      <div id="touch" class="hidden"></div>

      <!-- Persistent build-version badge -->
      <div id="version-badge"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
